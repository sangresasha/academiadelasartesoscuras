<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Academia de las Artes Oscuras</title>

    --gold: #c9933a;
    --gold2: #e8b86d;
    --text: #d4c4bc;

    --tag-bg: #1e1013;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(139,26,47,0.07) 0%, transparent 60%),

  nav {

    justify-content: center;
    flex-wrap: wrap;

    z-index: 100;

    font-size: 0.82rem;

  .nav-btn.active { color: var(--gold2); border-bottom-color: var(--gold); }

  .widget-container {

    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    z-index: 50;

  .widget {
    background: rgba(22, 14, 17, 0.95);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;

    backdrop-filter: blur(10px);
  }

  .widget-titulo {
    font-family: 'IM Fell English SC', serif;
    font-size: 0.7rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
    text-align: center;

  }

    font-size: 0.75rem; 
    color: var(--gold2); 
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
  }

  .cal-dias {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.2rem;
  }

  .cal-dia-nombre {
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
    font-weight: bold;
  }

  .cal-dia-numero {
    font-size: 0.65rem;
    text-align: center;
    color: var(--text);
    padding: 0.2rem;
    background: rgba(139, 26, 47, 0.2);
    border-radius: 2px;
  }

  .cal-dia-numero.hoy {
    background: var(--accent);
    color: #fff;
    font-weight: bold;
  }

  .visitantes {
    background: rgba(10, 6, 8, 0.8);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.8rem;
    text-align: center;
  }

  .visitantes-numero {

    color: var(--gold2);

  }

    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  @media (max-width: 768px) {
    .widget-container {
      bottom: 10px;
      right: 10px;
      gap: 0.8rem;
    }

      min-width: 180px;
      padding: 0.8rem;

// ============================================
// RELOJ Y CALENDARIO EN TIEMPO REAL
// ============================================
function actualizarReloj() {
  const ahora = new Date();
  const horas = String(ahora.getHours()).padStart(2, '0');
  const minutos = String(ahora.getMinutes()).padStart(2, '0');
  const segundos = String(ahora.getSeconds()).padStart(2, '0');
  
  document.getElementById('reloj').textContent = `${horas}:${minutos}:${segundos}`;
}

function actualizarCalendario() {
  const ahora = new Date();
  const mes = ahora.getMonth();
  const año = ahora.getFullYear();
  const hoy = ahora.getDate();
  
  const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
  const dias = ['D', 'L', 'M', 'X', 'J', 'V', 'S'];
  
  const primerDia = new Date(año, mes, 1).getDay();
  const ultimoDia = new Date(año, mes + 1, 0).getDate();
  
  let html = `<div class="cal-mes">${meses[mes]} ${año}</div>`;
  html += '<div class="cal-dias">';
  
  // Nombres de los días
  dias.forEach(d => {
    html += `<div class="cal-dia-nombre">${d}</div>`;
  });
  
  // Espacios vacíos
  for (let i = 0; i < primerDia; i++) {
    html += '<div class="cal-dia-numero" style="opacity:0;"></div>';
  }
  
  // Días del mes
  for (let i = 1; i <= ultimoDia; i++) {
    const clase = i === hoy ? 'hoy' : '';
    html += `<div class="cal-dia-numero ${clase}">${i}</div>`;
  }
  
  html += '</div>';
  document.getElementById('calendario').innerHTML = html;
}

// Actualizar cada segundo
setInterval(actualizarReloj, 1000);
setInterval(actualizarCalendario, 60000); // Actualizar cada minuto
actualizarReloj();
actualizarCalendario();

// ============================================
// CONTADOR DE VISITANTES
// ============================================
function inicializarContador() {
  let visitantes = parseInt(localStorage.getItem('visitantes') || '0');
  
  // Incrementar contador
  visitantes++;
  localStorage.setItem('visitantes', visitantes);
  
  document.getElementById('contador-visitantes').textContent = visitantes;
}

inicializarContador();

// ============================================
// NAVEGACIÓN
// ============================================
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const targetPage = document.getElementById(`page-${page}`);
  if (targetPage) targetPage.classList.add('active');
  
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  const matchingBtn = document.querySelector(`.nav-btn[data-page="${page}"]`);
  if (matchingBtn) matchingBtn.classList.add('active');
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchPage(btn.dataset.page));
  });
  
  document.querySelectorAll('.inicio-btn').forEach(btn => {
    btn.addEventListener('click', () => switchPage(btn.dataset.page));
  });
});

window.switchPage = switchPage;
</script>

      if (!cont) return;
      
      if (snap.empty) {
        cont.innerHTML = `<div class="blog-vacio"><span class="blog-vacio-icon">📖</span>Sin publicaciones aún.<br>Los secretos guardan silencio...</div>`;
        return;
      }

      cont.innerHTML = '';
      snap.forEach(docSnap => {
        const post = docSnap.data();
        const id = docSnap.id;
        const preview = post.contenido.slice(0, 150);
        
        const div = document.createElement('div');
        div.className = 'blog-post';
        
        let actionsHtml = `<div class="blog-titulo">${escHtml(post.titulo)}</div>`;
        
        if (isAdmin) {
          actionsHtml += `
            <div class="blog-actions" style="margin-top: 0.8rem;">
              <button class="blog-btn" onclick="window.editarPost('${id}')">Editar</button>
              <button class="blog-btn eliminar" onclick="window.eliminarPost('${id}')">Eliminar</button>
            </div>
          `;
        }
        
        div.innerHTML = `
          ${actionsHtml}
          <div class="blog-meta">${escHtml(post.autor)} · ${formatFecha(post.fecha)}</div>
          <div class="blog-preview">${escHtml(preview)}${preview.length >= 150 ? '…' : ''}</div>
        `;
        cont.appendChild(div);
      });
    }, (err) => console.error(err));
  }

  // LOGIN ADMIN
  document.getElementById('btn-login-admin')?.addEventListener('click', () => {
    document.getElementById('modal-login').classList.add('open');
  });

  document.getElementById('cerrar-login')?.addEventListener('click', () => {
    document.getElementById('modal-login').classList.remove('open');
  });

  document.getElementById('btn-login')?.addEventListener('click', () => {
    const pwd = document.getElementById('admin-password').value;
    if (pwd === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById('modal-login').classList.remove('open');
      document.getElementById('admin-password').value = '';
      document.getElementById('btn-nuevo-post').style.display = 'flex';
      cargarPosts();
    } else {
      alert('Contraseña incorrecta');
    }
  });

  // NUEVO POST
  document.getElementById('btn-nuevo-post')?.addEventListener('click', () => {
    if (!isAdmin) return;
    editingPostId = null;
    document.getElementById('modal-titulo').textContent = '✦ Nuevo Post';
    document.getElementById('post-titulo').value = '';
    document.getElementById('post-contenido').value = '';
    document.getElementById('modal-post').classList.add('open');
  });

  // GUARDAR POST
  document.getElementById('btn-guardar-post')?.addEventListener('click', async () => {
    if (!isAdmin) return;
    
    const titulo = document.getElementById('post-titulo').value.trim();
    const contenido = document.getElementById('post-contenido').value.trim();
    
    if (!titulo || !contenido) {
      alert('Por favor completa título y contenido');
      return;
    }

    try {
      if (editingPostId) {
        await updateDoc(doc(db, 'blog_posts', editingPostId), {
          titulo,
          contenido,
          fecha_editado: serverTimestamp()
        });
      } else {
        await addDoc(collection(db, 'blog_posts'), {
          titulo,
          contenido,
          autor: 'D. M. Soley',
          fecha: serverTimestamp()
        });
      }
      
      document.getElementById('modal-post').classList.remove('open');
      document.getElementById('post-titulo').value = '';
      document.getElementById('post-contenido').value = '';
      editingPostId = null;
    } catch (err) {
      console.error(err);
      alert('Error al guardar');
    }
  });

  // EDITAR POST
  window.editarPost = function(id) {
    if (!isAdmin) return;
    editingPostId = id;
    document.getElementById('modal-titulo').textContent = '✦ Editar Post';
    document.getElementById('modal-post').classList.add('open');
  };

  // ELIMINAR POST
  window.eliminarPost = function(id) {
    if (!isAdmin) return;
    if (confirm('¿Eliminar este post?')) {
      deleteDoc(doc(db, 'blog_posts', id)).catch(err => console.error(err));
    }
  };

  // CERRAR MODALES
  document.getElementById('cerrar-modal-post')?.addEventListener('click', () => {
    document.getElementById('modal-post').classList.remove('open');
  });

  document.getElementById('modal-post')?.addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      document.getElementById('modal-post').classList.remove('open');
    }
  });

  document.getElementById('modal-login')?.addEventListener('click', (e) => {
    if (e.target === e.currentTarget) {
      document.getElementById('modal-login').classList.remove('open');
    }
  });

  // INICIALIZAR
  cargarPosts();
</script>

</body>
</html>
