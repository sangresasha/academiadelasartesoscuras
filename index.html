<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia de las Artes Oscuras</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English+SC&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  :root {
    --bg: #0a0608;
    --card: #160e11;
    --border: #3a1f28;
    --accent: #8b1a2f;
    --gold: #c9933a;
    --gold2: #e8b86d;
    --text: #d4c4bc;
    --muted: #7a6460;
    --tag-bg: #1e1013;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(139,26,47,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(201,147,58,0.05) 0%, transparent 60%);
  }

  /* NAV */
  nav {
    display: flex;
    justify-content: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: rgba(10,6,8,0.95);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-btn {
    font-family: 'IM Fell English SC', serif;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 1rem 2.5rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { color: var(--gold2); }
  .nav-btn.active {
    color: var(--gold2);
    border-bottom-color: var(--gold);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 3rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  header::after {
    content: '';
    display: block;
    width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 1.2rem auto 0;
  }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    color: var(--gold2);
    letter-spacing: 0.06em;
    line-height: 1.3;
    text-shadow: 0 0 40px rgba(201,147,58,0.25);
  }
  .subtitle {
    font-family: 'IM Fell English SC', serif;
    color: var(--muted);
    font-size: 0.82rem;
    margin-top: 0.5rem;
    letter-spacing: 0.12em;
  }
  .count-badge {
    display: inline-block;
    background: var(--accent);
    color: #f0cfc0;
    font-family: 'IM Fell English SC', serif;
    font-size: 0.72rem;
    padding: 0.2em 0.9em;
    border-radius: 2px;
    margin-top: 0.6rem;
    letter-spacing: 0.1em;
  }
  .search-wrap {
    max-width: 440px;
    margin: 1.2rem auto 0;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    padding: 0.5rem 1rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap input::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    justify-content: center;
    padding: 1rem 1rem 0;
  }
  .filter-btn {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IM Fell English SC', serif;
    font-size: 0.72rem;
    padding: 0.25em 0.8em;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--gold);
    color: var(--gold2);
    background: rgba(201,147,58,0.07);
  }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* GRID */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.2rem;
  }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.3rem 1.4rem;
    position: relative;
    transition: border-color 0.25s, transform 0.2s;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .card:hover { border-color: #5a2535; transform: translateY(-2px); }
  .card:hover::before { opacity: 1; }

  /* LUGAR cards tienen acento diferente */
  .card.lugar::before { background: var(--gold); }
  .card.lugar:hover { border-color: #6a5020; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }
  .char-name {
    font-family: 'IM Fell English SC', serif;
    font-size: 1.05rem;
    color: var(--gold2);
    line-height: 1.2;
  }
  .char-type {
    font-family: 'IM Fell English SC', serif;
    font-size: 0.68rem;
    padding: 0.2em 0.6em;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  /* PERSONAJE tipos */
  .type-divino    { background: rgba(139,26,47,0.3);  color: #d98090; border: 1px solid rgba(139,26,47,0.5); }
  .type-angel     { background: rgba(20,40,80,0.3);   color: #7090c8; border: 1px solid rgba(20,40,80,0.5); }
  .type-alumno    { background: rgba(30,50,40,0.3);   color: #80b090; border: 1px solid rgba(30,50,40,0.5); }
  .type-mago      { background: rgba(42,60,100,0.3);  color: #88a0d0; border: 1px solid rgba(42,60,100,0.5); }
  .type-caballero { background: rgba(80,70,20,0.3);   color: #d0b860; border: 1px solid rgba(80,70,20,0.5); }
  .type-bruja     { background: rgba(20,80,60,0.3);   color: #70c8a0; border: 1px solid rgba(20,80,60,0.5); }
  .type-mortal    { background: rgba(60,50,50,0.3);   color: #b0a0a0; border: 1px solid rgba(60,50,50,0.5); }
  .type-bestia    { background: rgba(80,40,10,0.3);   color: #d09050; border: 1px solid rgba(80,40,10,0.5); }
  .type-entidad   { background: rgba(60,20,80,0.3);   color: #b888d0; border: 1px solid rgba(60,20,80,0.5); }

  /* LUGAR tipos */
  .type-castillo  { background: rgba(100,60,10,0.3);  color: #e0a840; border: 1px solid rgba(100,60,10,0.5); }
  .type-infierno  { background: rgba(120,20,20,0.3);  color: #e06060; border: 1px solid rgba(120,20,20,0.5); }
  .type-bosque    { background: rgba(20,60,30,0.3);   color: #60b870; border: 1px solid rgba(20,60,30,0.5); }
  .type-exterior  { background: rgba(40,40,70,0.3);   color: #8888c8; border: 1px solid rgba(40,40,70,0.5); }
  .type-otro      { background: rgba(50,50,50,0.3);   color: #a0a0a0; border: 1px solid rgba(50,50,50,0.5); }

  .char-desc {
    font-size: 0.93rem;
    color: var(--text);
    line-height: 1.55;
    font-style: italic;
    opacity: 0.9;
  }
  .char-source {
    margin-top: 0.7rem;
    font-size: 0.73rem;
    color: var(--muted);
    font-family: 'IM Fell English SC', serif;
    letter-spacing: 0.05em;
  }

  footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: 'IM Fell English SC', serif;
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<nav>
  <button class="nav-btn active" onclick="switchPage('personajes', this)">Personajes</button>
  <button class="nav-btn" onclick="switchPage('lugares', this)">Lugares</button>
</nav>

<!-- ===== PERSONAJES ===== -->
<div id="page-personajes" class="page active">
  <header>
    <h1>Academia de las Artes Oscuras</h1>
    <div class="subtitle">Log de Personajes · D. M. Soley</div>
    <div class="count-badge" id="badge-personajes">38 personajes</div>
    <div class="search-wrap">
      <input type="text" id="search-personajes" placeholder="Buscar personaje…" oninput="filterPersonajes()">
    </div>
    <div class="filters" id="filters-personajes">
      <button class="filter-btn active" onclick="setFilterP('todos',this)">Todos</button>
      <button class="filter-btn" onclick="setFilterP('divino',this)">Divino / Arconte</button>
      <button class="filter-btn" onclick="setFilterP('angel',this)">Ángel Caído</button>
      <button class="filter-btn" onclick="setFilterP('mago',this)">Mago / Empíreo</button>
      <button class="filter-btn" onclick="setFilterP('caballero',this)">Caballero</button>
      <button class="filter-btn" onclick="setFilterP('bruja',this)">Bruja / Hechicero</button>
      <button class="filter-btn" onclick="setFilterP('alumno',this)">Alumno</button>
      <button class="filter-btn" onclick="setFilterP('mortal',this)">Mortal / Civil</button>
      <button class="filter-btn" onclick="setFilterP('bestia',this)">Bestia / Dragón</button>
      <button class="filter-btn" onclick="setFilterP('entidad',this)">Entidad</button>
    </div>
  </header>
  <main id="grid-personajes"></main>
</div>

<!-- ===== LUGARES ===== -->
<div id="page-lugares" class="page">
  <header>
    <h1>Academia de las Artes Oscuras</h1>
    <div class="subtitle">Log de Lugares · D. M. Soley</div>
    <div class="count-badge" id="badge-lugares">— lugares</div>
    <div class="search-wrap">
      <input type="text" id="search-lugares" placeholder="Buscar lugar…" oninput="filterLugares()">
    </div>
    <div class="filters" id="filters-lugares">
      <button class="filter-btn active" onclick="setFilterL('todos',this)">Todos</button>
      <button class="filter-btn" onclick="setFilterL('castillo',this)">Castillo / Academia</button>
      <button class="filter-btn" onclick="setFilterL('infierno',this)">Inframundo</button>
      <button class="filter-btn" onclick="setFilterL('bosque',this)">Bosques / Exterior</button>
      <button class="filter-btn" onclick="setFilterL('exterior',this)">Tierras / Pueblos</button>
      <button class="filter-btn" onclick="setFilterL('otro',this)">Otro Plano</button>
    </div>
  </header>
  <main id="grid-lugares"></main>
</div>

<footer>Tercera Edición · Primer Parche · Edición Digital</footer>

<script>
// ─── PERSONAJES ────────────────────────────────────────────────────────────
const personajes = [
  { nombre:"Babalón / Gran Maestra", tipo:"divino", tipoLabel:"Divino / Arconte",
    desc:"Súcubo escarlata, hermana de Saturno/Saklas y personificación del morbo. Se manifiesta como Gran Maestra en el rito de la boda: emerge de la sangre de Julieta, dirige la ceremonia y dibuja la Runa del Augurio. Figura recurrente como guía, seductora y regente del culto; asume múltiples formas hasta volverse entidad titánica.",
    fuente:"Caps. 1, 2, 3 y 4" },
  { nombre:"Saturno / Saklas", tipo:"divino", tipoLabel:"Divino / Arconte",
    desc:"Arconte creado para ser juez y regir el destino. Se rebeló contra su creador junto a Babalón. Se presenta como cubo negro flotante; voz espléndida que retumba kilómetros.",
    fuente:"Cap. 1 – El infierno" },
  { nombre:"Sophia", tipo:"entidad", tipoLabel:"Entidad",
    desc:"La \"primera madre\". Ser primordial que contempla con llanto la sátira cósmica. Habita un castillo de cristal en el cielo, sola y melancólica; fuente originaria de la canción que recorre el mundo.",
    fuente:"Prólogo / Cap. 4 – La canción" },
  { nombre:"Leviatán", tipo:"angel", tipoLabel:"Ángel Caído",
    desc:"Enorme serpiente celeste. Aparece desde las estrellas en la batalla final y engulle cientos de servidores del Arquitecto de un solo bocado. Nyla se comunica con él en la playa para sellar su alianza con las Fuerzas del Mal.",
    fuente:"Cap. 3 – La fundamentalista / Cap. 4 – El gran conjuro" },
  { nombre:"Azazel", tipo:"angel", tipoLabel:"Ángel Caído",
    desc:"Llamada \"La Parca\". Viste armadura negra con rostro siempre oculto y silba una tonada casi imperceptible. Porta una espada legendaria que convierte en polvo a quien corta. Persigue a sus antiguos hermanos celestiales.",
    fuente:"Cap. 2 – La doncella de sangre / Cap. 4 – El gran conjuro" },
  { nombre:"Asmodeo", tipo:"angel", tipoLabel:"Ángel Caído",
    desc:"Ángel caído coqueta y rubia que lleva una máscara de huesos. Usa magia de seducción engañosa; intenta repetidamente entablar conversación con Morgana, quien la ignora.",
    fuente:"Cap. 2 – La doncella de sangre" },
  { nombre:"Belcebú", tipo:"angel", tipoLabel:"Ángel Caído",
    desc:"Súcubo de la mansión esmeralda. Desciende las escaleras como un espectro, enloquece y mata a los soldados de Alejandro IV con su sola presencia. Acepta a Alejandro como consorte y protector.",
    fuente:"Cap. 2 – Pasión y vesania" },
  { nombre:"Belial", tipo:"angel", tipoLabel:"Ángel Caído",
    desc:"Súcubo adorado por Eros. Lo seduce en una fiesta clandestina y lo lleva a una capilla de Babalón donde intenta arrancarle el corazón. Eros sobrevive pero queda obsesionado.",
    fuente:"Cap. 2 – Mi amor inmortal" },
  { nombre:"El Mago Empíreo", tipo:"mago", tipoLabel:"Mago / Empíreo",
    desc:"Un único recipiente que atraviesa múltiples vidas numeradas. Sensible y lunar en su primera encarnación; guerrero feroz en la segunda; tentado por el mal en la tercera; acosado por pesadillas de Babalón en la cuarta. En su vida final, agonizante líder de la academia, reflexiona sobre el destino de sus sucesores y su amor imposible por la luna.",
    fuente:"Cap. 2 – La contención, La crueldad, El llamado, Las 6 pesadillas, Apoteosis" },
  { nombre:"Caballero Guillermo V, Hijo del Sol", tipo:"caballero", tipoLabel:"Caballero",
    desc:"Cruzado que encuentra en un santuario del desierto un antifaz negro de acero. Al ponérselo puede comandar cadáveres. Primer portador del \"Rostro de Metal\".",
    fuente:"Cap. 1 – El rostro de metal" },
  { nombre:"Caballero Joaquín IV, Hijo del Sol", tipo:"caballero", tipoLabel:"Caballero",
    desc:"Cruzado superviviente de la persecución de la iglesia. Seducido en sueños por Babalón, lidera a los trece herejes supervivientes hacia la construcción del castillo.",
    fuente:"Cap. 1 – La persecución" },
  { nombre:"Alejandro IV, Hijo del Sol", tipo:"caballero", tipoLabel:"Caballero",
    desc:"Caballero enviado a destruir a Belcebú pero que cae enamorado de ella. Acepta convertirse en su consorte y protector, abandonando su fe y su misión.",
    fuente:"Cap. 2 – Pasión y vesania" },
  { nombre:"Kristian VIII, Hijo del Sol", tipo:"caballero", tipoLabel:"Caballero",
    desc:"Llamado \"Último Hijo del Sol\". General de las tropas aliadas de la Primera Orden. Virtuoso y bendecido por la luz; muere heroicamente ante el General de la Horda en la batalla final.",
    fuente:"Cap. 2 – Alabado sea el sol / Cap. 4" },
  { nombre:"Morgana, la Bruja de Invierno", tipo:"bruja", tipoLabel:"Bruja / Hechicero",
    desc:"Profesora prodigio de la academia. Creadora de los Noctámbulos y los Noctómanos. Piel pálida, cabello casi albino. Enamorada de Samara; protagonista de un arco emocional profundo. Mano derecha de El Depravado tras la devastación.",
    fuente:"Cap. 2 y 4 (diarios I–V)" },
  { nombre:"Samara", tipo:"bestia", tipoLabel:"Bestia / Dragón",
    desc:"Hija del Dragón (El Depravado). Profesora de manipulación y directora de la academia. Cabello pelirrojo, piel trigueña, ojos ámbar. Coronada princesa de los draconianos y espada de su padre. Ama a Morgana pero la guerra la consume.",
    fuente:"Caps. 2, 3 y 4" },
  { nombre:"Nyla / Colmillo Bebé", tipo:"alumno", tipoLabel:"Alumno",
    desc:"Alumna de la Casa de la Sangre: caníbal, sanguinaria y excéntrica. Sobreviviente de la calamidad; nombrada armera de Morgana. Recibe la runa del cielo al comunicarse con Leviatán. Vende información a cambio de oro.",
    fuente:"Caps. 2, 3 y 4" },
  { nombre:"Bruno, el Joven Noctómano", tipo:"alumno", tipoLabel:"Alumno",

  { nombre:"Mathew, el Joven Noctómano", tipo:"alumno", tipoLabel:"Alumno",

  { nombre:"Nhiguel", tipo:"alumno", tipoLabel:"Alumno",

    fuente:"Cap. 3 – Adónde fue el dragón" },
  { nombre:"Rodrigo, el Triste", tipo:"alumno", tipoLabel:"Alumno",
    desc:"Alumno de la academia secretamente enamorado de Samara. Observa desde lejos su belleza y poder sin atreverse a hablarle, paralizado por el maleficio de dominación.",

  { nombre:"Alicia, la Mentirosa", tipo:"alumno", tipoLabel:"Alumno",
    desc:"Alumna de la academia. Junto a Dante, se cuela de madrugada en la biblioteca donde encuentran al anciano misterioso y una cabra que los aterra con una risa no humana.",

  { nombre:"Dante", tipo:"alumno", tipoLabel:"Alumno",

  { nombre:"Eros, el Pretendiente", tipo:"alumno", tipoLabel:"Alumno",

  { nombre:"Namah", tipo:"alumno", tipoLabel:"Alumno",

  { nombre:"Selena, Consorte de Saturno", tipo:"mortal", tipoLabel:"Mortal / Civil",

  { nombre:"Natalia", tipo:"mortal", tipoLabel:"Mortal / Civil",
    desc:"Una de las tres esposas del rito. De sus genitales emerge Babalón al inicio de la ceremonia. Muere apuñalada por la diosa.",

  { nombre:"Julieta", tipo:"mortal", tipoLabel:"Mortal / Civil",
    desc:"Una de las tres esposas del rito. Muere a manos de Babalón durante la ceremonia.",
    fuente:"Cap. 1 – La boda" },
  { nombre:"Ayda, la Anciana", tipo:"mortal", tipoLabel:"Mortal / Civil",

  { nombre:"Caín", tipo:"mortal", tipoLabel:"Mortal / Civil",

  { nombre:"Nimrod, el Pueblerino", tipo:"mortal", tipoLabel:"Mortal / Civil",

  { nombre:"El Depravado / Dominus, el Primer Dragón", tipo:"bestia", tipoLabel:"Bestia / Dragón",

  { nombre:"General de la Horda", tipo:"bestia", tipoLabel:"Bestia / Dragón",

  { nombre:"Innana", tipo:"bestia", tipoLabel:"Bestia / Dragón",

  { nombre:"El Primordial / El Engendro", tipo:"entidad", tipoLabel:"Entidad",

  { nombre:"Mikael", tipo:"entidad", tipoLabel:"Entidad",
    desc:"Criatura nacida de la Lágrima Lunar. Tamaño de gato, escamas blancas translúcidas, cola larga y cuerno en la frente; emite luz iridiscente. Esperanza latente frente al dominio oscuro.",

// ─── LÓGICA ─────────────────────────────────────────────────────────────────
let filterP = 'todos';
let filterL = 'todos';

function switchPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  btn.classList.add('active');
}

function renderGrid(containerId, badgeId, list) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  list.forEach(item => {
    const div = document.createElement('div');
    div.className = 'card' + (containerId === 'grid-lugares' ? ' lugar' : '');
    div.innerHTML = `
      <div class="card-header">
        <div class="char-name">${item.nombre}</div>
        <span class="char-type type-${item.tipo}">${item.tipoLabel}</span>
      </div>
      <div class="char-desc">${item.desc}</div>
      <div class="char-source">◈ ${item.fuente}</div>
    `;
    grid.appendChild(div);
  });
  document.getElementById(badgeId).textContent = list.length + (containerId === 'grid-personajes' ? ' personajes' : ' lugares');
}

function filterPersonajes() {
  const q = document.getElementById('search-personajes').value.toLowerCase();
  const filtered = personajes.filter(p =>
    (filterP === 'todos' || p.tipo === filterP) &&
    (!q || p.nombre.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q))
  );
  renderGrid('grid-personajes', 'badge-personajes', filtered);
}

function filterLugares() {
  const q = document.getElementById('search-lugares').value.toLowerCase();
  const filtered = lugares.filter(l =>
    (filterL === 'todos' || l.tipo === filterL) &&
    (!q || l.nombre.toLowerCase().includes(q) || l.desc.toLowerCase().includes(q))
  );
  renderGrid('grid-lugares', 'badge-lugares', filtered);
}

function setFilterP(tipo, btn) {
  filterP = tipo;
  document.querySelectorAll('#filters-personajes .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterPersonajes();
}

function setFilterL(tipo, btn) {
  filterL = tipo;
  document.querySelectorAll('#filters-lugares .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterLugares();
}

// Init
renderGrid('grid-personajes', 'badge-personajes', personajes);
renderGrid('grid-lugares', 'badge-lugares', lugares);
</script>
