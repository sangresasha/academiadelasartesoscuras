<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia de las Artes Oscuras</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English+SC&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');

    :root {
      --bg: #0a0608;
      --card: #160e11;
      --border: #3a1f28;
      --accent: #8b1a2f;
      --gold: #c9933a;
      --gold2: #e8b86d;
      --text: #d4c4bc;
      --muted: #7a6460;
      --tag-bg: #1e1013;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(139,26,47,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(201,147,58,0.05) 0%, transparent 60%);
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: rgba(10,6,8,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-btn {
      font-family: 'IM Fell English SC', serif;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 1rem 1.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover { color: var(--gold2); }
    .nav-btn.active { color: var(--gold2); border-bottom-color: var(--gold); }

    /* Página de inicio */
    #page-inicio {
      display: block;
      background: #000;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    .inicio-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      z-index: 10;
    }
    .inicio-libros {
      position: fixed;
      bottom: 0;
      left: 0;
      width: min(400px, 80vw);
      height: 300px;
      z-index: 1;
      opacity: 0.85;
      pointer-events: none;
      background: url('https://i.imgur.com/EXj6J44.jpg') no-repeat bottom left;
      background-size: contain;
    }
    .inicio-titulo {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      color: var(--gold2);
      text-shadow: 0 0 70px rgba(201,147,58,0.4);
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
      line-height: 1.2;
    }
    .inicio-botones {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .inicio-btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      color: var(--gold2);
      background: transparent;
      border: 1px solid var(--gold);
      padding: 0.7rem 2.5rem;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.3s;
      text-transform: uppercase;
      position: relative;
      text-decoration: none;
      display: inline-block;
    }
    .inicio-btn:hover {
      background: rgba(201,147,58,0.08);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 25px rgba(139,26,47,0.3);
    }
    .inicio-btn::before {
      content: '🕯';
      position: absolute;
      left: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      transition: opacity 0.3s;
      font-size: 1rem;
    }
    .inicio-btn:hover::before { opacity: 1; }

    /* Cabeceras comunes */
    header { text-align: center; padding: 3rem 2rem 1.5rem; border-bottom: 1px solid var(--border); }
    header::after { content: ''; display: block; width: 120px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 1.2rem auto 0; }
    h1 { font-family: 'Cinzel Decorative', serif; font-size: clamp(1rem, 2.5vw, 1.6rem); color: var(--gold2); letter-spacing: 0.06em; line-height: 1.3; text-shadow: 0 0 40px rgba(201,147,58,0.25); }
    .subtitle { font-family: 'IM Fell English SC', serif; color: var(--muted); font-size: 0.82rem; margin-top: 0.5rem; letter-spacing: 0.12em; }
    .count-badge { display: inline-block; background: var(--accent); color: #f0cfc0; font-family: 'IM Fell English SC', serif; font-size: 0.72rem; padding: 0.2em 0.9em; border-radius: 2px; margin-top: 0.6rem; letter-spacing: 0.1em; }
    .search-wrap { max-width: 440px; margin: 1.2rem auto 0; }
    .search-wrap input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: 'Crimson Pro', serif; font-size: 0.95rem; padding: 0.5rem 1rem; border-radius: 3px; outline: none; transition: border-color 0.2s; }
    .search-wrap input:focus { border-color: var(--gold); }
    .search-wrap input::placeholder { color: var(--muted); }
    .filters { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; padding: 1rem 1rem 0; }
    .filter-btn { background: var(--tag-bg); border: 1px solid var(--border); color: var(--muted); font-family: 'IM Fell English SC', serif; font-size: 0.72rem; padding: 0.25em 0.8em; cursor: pointer; border-radius: 2px; letter-spacing: 0.08em; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold2); background: rgba(201,147,58,0.07); }

    .page { display: none; }
    .page.active { display: block; }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.2rem 4rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1.3rem 1.4rem; position: relative; transition: border-color 0.25s, transform 0.2s; overflow: hidden; cursor: pointer; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); opacity: 0; transition: opacity 0.25s; }
    .card:hover { border-color: #5a2535; transform: translateY(-2px); }
    .card:hover::before { opacity: 1; }
    .card.lugar::before { background: var(--gold); }
    .card.lugar:hover { border-color: #6a5020; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.6rem; }
    .char-name { font-family: 'IM Fell English SC', serif; font-size: 1.05rem; color: var(--gold2); line-height: 1.2; }
    .char-type { font-family: 'IM Fell English SC', serif; font-size: 0.68rem; padding: 0.2em 0.6em; border-radius: 2px; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.05em; }
    /* estilos de tipos... (igual que antes) */
    .char-desc { font-size: 0.93rem; color: var(--text); line-height: 1.55; font-style: italic; opacity: 0.9; }
    .char-source { margin-top: 0.7rem; font-size: 0.73rem; color: var(--muted); font-family: 'IM Fell English SC', serif; letter-spacing: 0.05em; }

    /* Detalle modal */
    .detalle-modal .modal { max-width: 700px; }
    .detalle-modal .detalle-nombre { font-family: 'IM Fell English SC', serif; font-size: 1.4rem; color: var(--gold2); margin-bottom: 0.3rem; }
    .detalle-modal .detalle-tipo { font-size: 0.85rem; margin-bottom: 1rem; display: inline-block; }
    .detalle-modal .detalle-desc { font-size: 1.1rem; line-height: 1.7; margin-bottom: 1rem; font-style: italic; }
    .detalle-modal .detalle-fuente { font-size: 0.85rem; color: var(--muted); font-family: 'IM Fell English SC', serif; letter-spacing: 0.05em; }

    /* Foro */
    .foro-wrap { max-width: 820px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }
    #foro-lista { display: block; }
    #foro-hilo  { display: none; }
    .btn-nuevo-hilo { display: flex; align-items: center; gap: 0.5rem; background: none; border: 1px solid var(--accent); color: var(--gold2); font-family: 'IM Fell English SC', serif; font-size: 0.85rem; letter-spacing: 0.1em; padding: 0.55rem 1.4rem; cursor: pointer; border-radius: 3px; transition: all 0.2s; margin-bottom: 1.6rem; }
    .btn-nuevo-hilo:hover { background: rgba(139,26,47,0.18); border-color: var(--gold); }
    .sep { width: 100%; height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); margin: 1.2rem 0; }
    .hilo-item { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1rem 1.3rem; cursor: pointer; transition: border-color 0.2s, transform 0.15s; position: relative; overflow: hidden; }
    .hilo-item::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
    .hilo-item:hover { border-color: #5a2535; transform: translateY(-1px); }
    .hilo-item:hover::before { opacity: 1; }
    .hilo-item + .hilo-item { margin-top: 0.7rem; }
    .hilo-titulo { font-family: 'IM Fell English SC', serif; font-size: 1rem; color: var(--gold2); margin-bottom: 0.2rem; }
    .hilo-meta { font-size: 0.78rem; color: var(--muted); font-family: 'IM Fell English SC', serif; letter-spacing: 0.05em; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
    .hilo-meta .resp-count { background: rgba(139,26,47,0.25); color: #d98090; border: 1px solid rgba(139,26,47,0.4); padding: 0.1em 0.6em; border-radius: 2px; font-size: 0.7rem; }
    .hilo-preview { font-size: 0.88rem; color: var(--text); opacity: 0.7; margin-top: 0.35rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-volver { background: none; border: none; color: var(--muted); font-family: 'IM Fell English SC', serif; font-size: 0.82rem; letter-spacing: 0.1em; cursor: pointer; padding: 0; margin-bottom: 1.4rem; transition: color 0.2s; display: flex; align-items: center; gap: 0.4rem; }
    .btn-volver:hover { color: var(--gold2); }
    .hilo-detalle-titulo { font-family: 'IM Fell English SC', serif; font-size: 1.35rem; color: var(--gold2); line-height: 1.25; margin-bottom: 0.3rem; }
    .hilo-detalle-meta { font-size: 0.78rem; color: var(--muted); font-family: 'IM Fell English SC', serif; letter-spacing: 0.05em; margin-bottom: 1.2rem; }
    .mensaje { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1rem 1.3rem; margin-bottom: 0.8rem; position: relative; }
    .mensaje.op { border-color: #4a2535; }
    .mensaje.op::before { content: 'OP'; position: absolute; top: 0.7rem; right: 0.9rem; font-family: 'IM Fell English SC', serif; font-size: 0.65rem; color: var(--accent); letter-spacing: 0.08em; }
    .msg-autor { font-family: 'IM Fell English SC', serif; font-size: 0.82rem; color: var(--gold); margin-bottom: 0.25rem; letter-spacing: 0.05em; }
    .msg-fecha { font-family: 'IM Fell English SC', serif; font-size: 0.7rem; color: var(--muted); margin-left: 0.6rem; }
    .msg-texto { font-size: 0.97rem; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg-eliminar { position: absolute; top: 0.5rem; right: 0.7rem; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; opacity: 0; transition: opacity 0.2s; }
    .mensaje:hover .msg-eliminar { opacity: 0.7; }
    .msg-eliminar:hover { color: #d44; opacity: 1; }

    .foro-form { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1.3rem; margin-top: 1.2rem; }
    .foro-form h3 { font-family: 'IM Fell English SC', serif; font-size: 0.85rem; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 0.9rem; }
    .foro-form label { display: block; font-family: 'IM Fell English SC', serif; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 0.25rem; margin-top: 0.7rem; }
    .foro-form label:first-of-type { margin-top: 0; }
    .foro-form input, .foro-form textarea { width: 100%; background: #0f0910; border: 1px solid var(--border); color: var(--text); font-family: 'Crimson Pro', serif; font-size: 0.97rem; padding: 0.5rem 0.9rem; border-radius: 3px; outline: none; transition: border-color 0.2s; resize: vertical; }
    .foro-form input:focus, .foro-form textarea:focus { border-color: var(--gold); }
    .foro-form textarea { min-height: 90px; }
    .foro-form .form-row { display: flex; gap: 0.7rem; flex-wrap: wrap; }
    .foro-form .form-row > div { flex: 1; min-width: 160px; }
    .btn-submit { margin-top: 1rem; background: var(--accent); border: 1px solid #a02040; color: #f0cfc0; font-family: 'IM Fell English SC', serif; font-size: 0.82rem; letter-spacing: 0.1em; padding: 0.55rem 1.6rem; cursor: pointer; border-radius: 3px; transition: all 0.2s; }
    .btn-submit:hover { background: #a02040; border-color: var(--gold); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .foro-vacio { text-align: center; padding: 3rem 1rem; color: var(--muted); font-family: 'IM Fell English SC', serif; font-size: 0.9rem; letter-spacing: 0.08em; }
    .foro-vacio-icon { font-size: 2rem; display: block; margin-bottom: 0.7rem; opacity: 0.35; }
    .foro-loading { text-align: center; padding: 2rem; color: var(--muted); font-family: 'IM Fell English SC', serif; font-size: 0.85rem; letter-spacing: 0.1em; }

    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(5,3,4,0.88); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 5px; padding: 1.8rem; max-width: 540px; width: 100%; position: relative; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-family: 'IM Fell English SC', serif; color: var(--gold2); font-size: 1.1rem; letter-spacing: 0.1em; margin-bottom: 1.2rem; }
    .modal::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); border-radius: 5px 0 0 5px; }
    .btn-cerrar-modal { position: absolute; top: 0.8rem; right: 1rem; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; transition: color 0.2s; line-height: 1; }
    .btn-cerrar-modal:hover { color: var(--gold2); }

    /* Footer */
    footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.78rem; font-family: 'IM Fell English SC', serif; letter-spacing: 0.1em; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

<nav>
  <button class="nav-btn active" onclick="switchPage('inicio', this)">Inicio</button>
  <button class="nav-btn" onclick="switchPage('personajes', this)">Personajes</button>
  <button class="nav-btn" onclick="switchPage('lugares', this)">Lugares</button>
  <button class="nav-btn" onclick="switchPage('cronologia', this)">Cronología</button>
  <button class="nav-btn" onclick="switchPage('facciones', this)">Facciones</button>
  <button class="nav-btn" onclick="switchPage('glosario', this)">Glosario</button>
  <button class="nav-btn" onclick="switchPage('videos', this)">Videos</button>
  <button class="nav-btn" onclick="switchPage('foro', this)">Foro</button>
</nav>

<!-- INICIO -->
<div id="page-inicio" class="page active">
  <div class="inicio-libros"></div>
  <div class="inicio-wrap">
    <h1 class="inicio-titulo">ACADEMIA DE LAS ARTES OSCURAS</h1>
    <div class="inicio-botones">
      <button class="inicio-btn" onclick="switchPage('personajes', document.querySelector('.nav-btn:nth-child(2)'))">Entrar</button>
      <button class="inicio-btn" onclick="switchPage('foro', document.querySelector('.nav-btn:nth-child(8)'))">Foro</button>
    </div>
  </div>
</div>

<!-- PERSONAJES -->
<div id="page-personajes" class="page">
  <header>
    <h1>Academia de las Artes Oscuras</h1>
    <div class="subtitle">Log de Personajes · D. M. Soley</div>
    <div class="count-badge" id="badge-personajes">38 personajes</div>
    <div class="search-wrap"><input type="text" id="search-personajes" placeholder="Buscar personaje…" oninput="filterPersonajes()"></div>
    <div class="filters" id="filters-personajes">
      <button class="filter-btn active" onclick="setFilterP('todos',this)">Todos</button>
      <button class="filter-btn" onclick="setFilterP('divino',this)">Divino / Arconte</button>
      <button class="filter-btn" onclick="setFilterP('angel',this)">Ángel Caído</button>
      <button class="filter-btn" onclick="setFilterP('mago',this)">Mago / Empíreo</button>
      <button class="filter-btn" onclick="setFilterP('caballero',this)">Caballero</button>
      <button class="filter-btn" onclick="setFilterP('bruja',this)">Bruja / Hechicero</button>
      <button class="filter-btn" onclick="setFilterP('alumno',this)">Alumno</button>
      <button class="filter-btn" onclick="setFilterP('mortal',this)">Mortal / Civil</button>
      <button class="filter-btn" onclick="setFilterP('bestia',this)">Bestia / Dragón</button>
      <button class="filter-btn" onclick="setFilterP('entidad',this)">Entidad</button>
    </div>
  </header>
  <main id="grid-personajes"></main>
</div>

<!-- LUGARES, CRONOLOGÍA, FACCIONES, GLOSARIO, VIDEOS (mantenidos sin cambios) -->
<div id="page-lugares" class="page"><!-- ... --></div>
<div id="page-cronologia" class="page"><!-- ... --></div>
<div id="page-facciones" class="page"><!-- ... (con lemas actualizados) ... --></div>
<div id="page-glosario" class="page"><!-- ... --></div>
<div id="page-videos" class="page"><!-- ... --></div>

<!-- FORO -->
<div id="page-foro" class="page">
  <header>
    <h1>Academia de las Artes Oscuras</h1>
    <div class="subtitle">Cámara de los Susurros · Foro</div>
    <div class="count-badge" id="badge-foro">0 hilos</div>
  </header>
  <div class="foro-wrap">
    <div id="foro-lista">
      <button class="btn-nuevo-hilo" onclick="abrirModal()">✦ Abrir nuevo hilo</button>
      <div id="hilos-container"><div class="foro-loading">Invocando los archivos…</div></div>
    </div>
    <div id="foro-hilo">
      <button class="btn-volver" onclick="volverLista()">← Volver a los hilos</button>
      <div class="hilo-detalle-titulo" id="hilo-titulo-detalle"></div>
      <div class="hilo-detalle-meta" id="hilo-meta-detalle"></div>
      <div class="sep"></div>
      <div id="mensajes-container"></div>
      <div class="foro-form">
        <h3>◈ Dejar una respuesta</h3>
        <label>Tu nombre</label>
        <input type="text" id="resp-autor" placeholder="Nombre o seudónimo…" maxlength="60">
        <label>Mensaje</label>
        <textarea id="resp-texto" placeholder="Escribe tu respuesta…" maxlength="2000"></textarea>
        <button class="btn-submit" id="btn-resp" onclick="enviarRespuesta()">Enviar respuesta</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal nuevo hilo -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="btn-cerrar-modal" onclick="cerrarModal()">✕</button>
    <h2>✦ Nuevo hilo</h2>
    <div class="foro-form" style="background:none;border:none;padding:0;margin:0;">
      <div class="form-row">
        <div><label>Tu nombre</label><input type="text" id="nuevo-autor" placeholder="Nombre o seudónimo…" maxlength="60"></div>
        <div><label>Categoría</label><input type="text" id="nuevo-cat" placeholder="ej. Teorías, Personajes…" maxlength="40"></div>
      </div>
      <label>Título del hilo</label>
      <input type="text" id="nuevo-titulo" placeholder="¿De qué querés hablar?" maxlength="120">
      <label>Mensaje inicial</label>
      <textarea id="nuevo-texto" placeholder="Escribe el primer mensaje del hilo…" maxlength="3000"></textarea>
      <button class="btn-submit" id="btn-crear" onclick="crearHilo()">Abrir hilo</button>
    </div>
  </div>
</div>

<!-- Modal detalle personajes/lugares -->
<div class="modal-bg detalle-modal" id="detalle-modal-bg">
  <div class="modal">
    <button class="btn-cerrar-modal" onclick="cerrarDetalle()">✕</button>
    <div class="detalle-nombre" id="detalle-nombre"></div>
    <span class="char-type detalle-tipo" id="detalle-tipo"></span>
    <div class="detalle-desc" id="detalle-desc"></div>
    <div class="detalle-fuente" id="detalle-fuente"></div>
  </div>
</div>

<footer>Tercera Edición · Primer Parche · Edición Digital</footer>

    storageBucket: "aao-ecds-1.firebasestorage.app",
    messagingSenderId: "186213040999",
    appId: "1:186213040999:web:9e8c9fd8e7ac7e3dc065c2"
  };

  const app = initializeApp(firebaseConfig);

  function fechaFormato(ts) {
    if (!ts) return '…';
    const d = (ts.toDate) ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('es', { day:'2-digit', month:'short', year:'numeric' }) +
           ' · ' + d.toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' });
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  let hiloActualId = null;
  let unsubHilos   = null;
  let unsubMensajes = null;

  // Escucha de hilos
  function iniciarEscuchaHilos() {
    if (unsubHilos) return;
    const q = query(collection(db, 'hilos'), orderBy('fecha', 'desc'));
    unsubHilos = onSnapshot(q, (snap) => {
      const cont  = document.getElementById('hilos-container');
      const badge = document.getElementById('badge-foro');
      badge.textContent = snap.size + ' hilo' + (snap.size !== 1 ? 's' : '');
      if (snap.empty) {
        cont.innerHTML = `<div class="foro-vacio"><span class="foro-vacio-icon">🕯</span>Ningún hilo ha sido abierto aún.<br>Sé el primero en romper el silencio.</div>`;
        return;
      }
      cont.innerHTML = '';
      snap.forEach(docSnap => {
        const h  = docSnap.data();
        const id = docSnap.id;
        const respCount = h.mensajes ? h.mensajes.length - 1 : 0;
        const preview   = h.mensajes && h.mensajes[0] ? h.mensajes[0].texto.slice(0, 120) : '';
        const div = document.createElement('div');
        div.className = 'hilo-item';
        div.onclick = () => abrirHilo(id, h);
        div.innerHTML = `
          <div class="hilo-titulo">${escHtml(h.titulo)}</div>
          <div class="hilo-preview">${escHtml(preview)}${preview.length >= 120 ? '…' : ''}</div>
          <div class="hilo-meta">
            <span>✦ ${escHtml(h.autor)}</span>
            ${h.categoria ? `<span>· ${escHtml(h.categoria)}</span>` : ''}
            <span>· ${fechaFormato(h.fecha)}</span>
            <span class="resp-count">${respCount} resp.</span>
          </div>`;
        cont.appendChild(div);
      });
    });
  }

  // Abrir hilo y escuchar mensajes
  function abrirHilo(id, data) {
    hiloActualId = id;
    document.getElementById('foro-lista').style.display = 'none';
    document.getElementById('foro-hilo').style.display  = 'block';
    document.getElementById('hilo-titulo-detalle').textContent = data.titulo;
    document.getElementById('hilo-meta-detalle').textContent   =
      `Iniciado por ${data.autor}${data.categoria ? ' · ' + data.categoria : ''} · ${fechaFormato(data.fecha)}`;
    document.getElementById('resp-autor').value = '';
    document.getElementById('resp-texto').value = '';

    if (unsubMensajes) unsubMensajes();
    unsubMensajes = onSnapshot(doc(db, 'hilos', id), (snap) => {
      if (snap.exists()) renderMensajes(snap.data().mensajes || []);
    });
  }

  // Renderizar mensajes con botón de eliminar
  function renderMensajes(mensajes) {
    const cont = document.getElementById('mensajes-container');
    cont.innerHTML = '';
    mensajes.forEach((m, i) => {
      const div = document.createElement('div');
      div.className = 'mensaje' + (i === 0 ? ' op' : '');
      div.innerHTML = `
        <div class="msg-autor">${escHtml(m.autor)}<span class="msg-fecha">${fechaFormato(m.fecha)}</span></div>
        <div class="msg-texto">${escHtml(m.texto)}</div>
        <button class="msg-eliminar" title="Eliminar mensaje" data-indice="${i}">🗑️</button>
      `;
      cont.appendChild(div);
    });

    // Agregar evento a los botones de eliminar
    document.querySelectorAll('.msg-eliminar').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const indice = parseInt(btn.getAttribute('data-indice'), 10);
        if (confirm('¿Eliminar este mensaje definitivamente?')) {
          await eliminarMensaje(indice);
        }
      });
    });
  }

  // Función para eliminar un mensaje del array
  async function eliminarMensaje(indice) {
    if (!hiloActualId) return;
    try {
      const snap = await getDoc(doc(db, 'hilos', hiloActualId));
      if (!snap.exists()) return;
      const data = snap.data();
      const mensajes = data.mensajes || [];
      if (indice < 0 || indice >= mensajes.length) return;
      mensajes.splice(indice, 1); // eliminar el mensaje en esa posición
      await updateDoc(doc(db, 'hilos', hiloActualId), { mensajes: mensajes });
    } catch (error) {
      console.error('Error al eliminar mensaje:', error);
      alert('No se pudo eliminar el mensaje.');
    }
  }

  // Resto de funciones (volverLista, abrirModal, cerrarModal, crearHilo, enviarRespuesta) se mantienen idénticas
  window.volverLista = function() {
    hiloActualId = null;
    if (unsubMensajes) { unsubMensajes(); unsubMensajes = null; }
    document.getElementById('foro-lista').style.display = 'block';
    document.getElementById('foro-hilo').style.display  = 'none';
  };

  window.abrirModal   = () => document.getElementById('modal-bg').classList.add('open');
  window.cerrarModal  = () => document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === e.currentTarget) window.cerrarModal(); });

  window.crearHilo = async function() {
    const autor  = document.getElementById('nuevo-autor').value.trim();
    const cat    = document.getElementById('nuevo-cat').value.trim();
    const titulo = document.getElementById('nuevo-titulo').value.trim();
    const texto  = document.getElementById('nuevo-texto').value.trim();
    if (!autor)  { alert('Por favor ingresá tu nombre.'); return; }
    if (!titulo) { alert('El hilo necesita un título.'); return; }
    if (!texto)  { alert('Escribe el primer mensaje del hilo.'); return; }
    const btn = document.getElementById('btn-crear');
    btn.disabled = true; btn.textContent = 'Abriendo…';
    try {
      const ref = await addDoc(collection(db, 'hilos'), {
        titulo, autor, categoria: cat,
        fecha: serverTimestamp(),
        mensajes: [{ autor, texto, fecha: new Date().toISOString() }]
      });
      window.cerrarModal();
      ['nuevo-autor','nuevo-cat','nuevo-titulo','nuevo-texto'].forEach(id => { document.getElementById(id).value = ''; });
      abrirHilo(ref.id, { titulo, autor, categoria: cat, fecha: { toDate: () => new Date() } });
    } catch(e) {
      alert('Error al crear el hilo. Verificá tu conexión y las reglas de Firestore.');
      console.error(e);
    }
    btn.disabled = false; btn.textContent = 'Abrir hilo';
  };

  window.enviarRespuesta = async function() {
    const autor = document.getElementById('resp-autor').value.trim();
    const texto = document.getElementById('resp-texto').value.trim();
    if (!autor) { alert('Por favor ingresá tu nombre.'); return; }
    if (!texto) { alert('Escribe un mensaje.'); return; }
    if (!hiloActualId) return;
    const btn = document.getElementById('btn-resp');
    btn.disabled = true; btn.textContent = 'Enviando…';
    try {
      await updateDoc(doc(db, 'hilos', hiloActualId), {
        mensajes: arrayUnion({ autor, texto, fecha: new Date().toISOString() })
      });
      document.getElementById('resp-autor').value = '';
      document.getElementById('resp-texto').value = '';
      setTimeout(() => {
        const last = document.getElementById('mensajes-container').lastElementChild;
        last && last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 300);
    } catch(e) {
      alert('Error al enviar. Verificá tu conexión.');
      console.error(e);
    }
    btn.disabled = false; btn.textContent = 'Enviar respuesta';
  };

  const _origSwitch = window.switchPage;
  window.switchPage = function(page, btn) {
    _origSwitch(page, btn);
    if (page === 'foro') iniciarEscuchaHilos();
  };
</script>

    document.getElementById('detalle-nombre').textContent = item.nombre;

    tipoEl.textContent = item.tipoLabel;
    tipoEl.className = 'char-type detalle-tipo type-' + item.tipo;

  // Renderizado de grids
  function renderGrid(containerId, badgeId, list) {
    const grid = document.getElementById(containerId);
    grid.innerHTML = '';
    list.forEach(item => {
      const div = document.createElement('div');
      div.className = 'card' + (containerId === 'grid-lugares' ? ' lugar' : '');
      div.innerHTML = `<div class="card-header"><div class="char-name">${item.nombre}</div><span class="char-type type-${item.tipo}">${item.tipoLabel}</span></div><div class="char-desc">${item.desc}</div><div class="char-source">◈ ${item.fuente}</div>`;
      div.addEventListener('click', () => abrirDetalle(item));
      grid.appendChild(div);
    });
    document.getElementById(badgeId).textContent = list.length + (containerId === 'grid-personajes' ? ' personajes' : ' lugares');
  }

  // Filtros...
